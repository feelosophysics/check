<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 입체 육면체 전개도 시뮬레이터 & X-Ray 포개짐 분석기</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Outfit:wght@500;700;900&display=swap"
        rel="stylesheet">
    <!-- Three.js & OrbitControls via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root {
            --bg-color: #0b1120;
            --panel-bg: rgba(15, 23, 42, 0.85);
            --panel-border: rgba(255, 255, 255, 0.12);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --accent: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: rgba(30, 41, 59, 0.7);
            --gold: #fbbf24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header / Control Bar */
        .header {
            height: 72px;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            z-index: 100;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header-title h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #34d399, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .header-title span {
            font-size: 0.75rem;
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.4);
            padding: 4px 10px;
            border-radius: 999px;
            font-weight: 600;
        }

        /* Fold Controls in Header */
        .fold-controls {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--panel-border);
            padding: 8px 18px;
            border-radius: 12px;
            backdrop-filter: blur(8px);
        }

        .fold-controls label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 260px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #334155;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary);
            border: 3px solid #ffffff;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.8);
            cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            background: #60a5fa;
        }

        .percent-badge {
            font-family: 'Outfit', monospace;
            font-size: 0.95rem;
            font-weight: 700;
            color: #60a5fa;
            min-width: 48px;
            text-align: right;
        }

        /* Main Workspace Container */
        .workspace {
            display: flex;
            flex: 1;
            height: calc(100vh - 72px);
            position: relative;
        }

        /* 3D Viewport Left */
        .viewport-container {
            flex: 1;
            position: relative;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 70%, #020617 100%);
            overflow: hidden;
        }

        #webgl-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Floating Panel Toggle Collapse Button inside Viewport */
        .floating-toggle-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(59, 130, 246, 0.5);
            color: #60a5fa;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            z-index: 80;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .floating-toggle-btn:hover {
            background: var(--primary);
            color: #ffffff;
            transform: scale(1.05);
        }

        /* Panel Resizer Drag Bar */
        .panel-resizer {
            width: 8px;
            background: rgba(15, 23, 42, 0.9);
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            cursor: col-resize;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 60;
            transition: background 0.2s ease;
        }

        .panel-resizer:hover,
        .panel-resizer.resizing {
            background: var(--primary);
        }

        .resizer-handle {
            width: 2px;
            height: 32px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 2px;
        }

        /* Camera Snap Buttons Overlay */
        .camera-snaps {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-width: 520px;
            z-index: 10;
        }

        .snap-btn {
            background: rgba(15, 23, 42, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-main);
            padding: 7px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .snap-btn:hover {
            background: rgba(59, 130, 246, 0.25);
            border-color: rgba(59, 130, 246, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .snap-btn.active {
            background: var(--primary);
            border-color: #60a5fa;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        /* X-Ray Transparency Overlay Bar */
        .xray-bar {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 10px 18px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 14px;
            z-index: 10;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
        }

        .xray-bar label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #fbbf24;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Right Panel Tabs & Inspector */
        .right-panel {
            width: 440px;
            min-width: 320px;
            max-width: 800px;
            flex-shrink: 0;
            background: var(--panel-bg);
            border-left: 1px solid var(--panel-border);
            backdrop-filter: blur(16px);
            display: flex;
            flex-direction: column;
            z-index: 50;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
            transition: width 0.25s cubic-bezier(0.16, 1, 0.3, 1), height 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .right-panel.collapsed {
            width: 0 !important;
            min-width: 0 !important;
            padding: 0 !important;
            border: none !important;
            overflow: hidden !important;
        }

        /* Responsive iPad & Mobile Media Queries */
        @media (max-width: 960px) {
            .workspace {
                flex-direction: column;
            }

            .viewport-container {
                flex: none;
                height: 55vh;
                width: 100%;
            }

            .panel-resizer {
                width: 100%;
                height: 8px;
                cursor: row-resize;
            }

            .resizer-handle {
                width: 32px;
                height: 2px;
            }

            .right-panel {
                width: 100% !important;
                max-width: 100% !important;
                height: calc(45vh - 8px);
                border-left: none;
                border-top: 1px solid var(--panel-border);
            }

            .right-panel.collapsed {
                height: 0 !important;
            }

            .header {
                padding: 0 12px;
                height: auto;
                min-height: 64px;
                flex-wrap: wrap;
                gap: 8px;
            }

            .camera-snaps {
                max-width: 90%;
            }
        }

        .tab-buttons {
            display: flex;
            border-bottom: 1px solid var(--panel-border);
            background: rgba(15, 23, 42, 0.5);
        }

        .tab-btn {
            flex: 1;
            padding: 14px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .tab-btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.03);
        }

        .tab-btn.active {
            color: #60a5fa;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Overlap Inspector Cards */
        .inspector-summary {
            background: rgba(59, 130, 246, 0.12);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #e2e8f0;
        }

        .cluster-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .cluster-card:hover {
            border-color: #60a5fa;
            transform: translateX(3px);
            background: rgba(30, 41, 59, 0.9);
        }

        .cluster-card.highlight {
            border-color: #fbbf24;
            background: rgba(251, 191, 36, 0.12);
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.25);
        }

        .cluster-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .cluster-title {
            font-weight: 700;
            font-size: 0.9rem;
            color: #60a5fa;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .cluster-count {
            font-size: 0.75rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: 6px;
            color: #cbd5e1;
        }

        .stacked-cells {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .stack-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.6);
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .stack-level {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent);
            min-width: 45px;
        }

        .stack-char {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            color: #ffffff;
            background: rgba(59, 130, 246, 0.25);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            border: 1px solid rgba(59, 130, 246, 0.4);
        }

        .stack-info {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: right;
        }

        /* 2D Crease Pattern Editor Tab */
        .editor-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .preset-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .preset-btn {
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.35);
            color: #60a5fa;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
            text-align: center;
        }

        .preset-btn:hover {
            background: var(--primary);
            color: #ffffff;
        }

        .preset-btn.reset {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.35);
            color: #f87171;
        }

        .preset-btn.reset:hover {
            background: var(--danger);
            color: #ffffff;
        }

        #crease-svg-wrapper {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 10px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #crease-svg {
            width: 100%;
            height: auto;
            max-height: 380px;
        }

        .crease-legend {
            display: flex;
            justify-content: space-around;
            background: rgba(15, 23, 42, 0.8);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.4);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

<body>

    <!-- Header Control Bar -->
    <header class="header">
        <div class="header-title">
            <h1>CUBE FOLD SIMULATOR</h1>
            <span>3D X-Ray & Layer Inspector</span>
        </div>

        <div class="fold-controls">
            <label for="fold-slider">
                <span>🔄 접기 각도 (Fold Percent):</span>
            </label>
            <div class="slider-container">
                <input type="range" id="fold-slider" min="0" max="100" value="100" step="0.5">
                <div class="percent-badge" id="percent-text">100%</div>
            </div>
        </div>
    </header>

    <!-- Main Workspace -->
    <div class="workspace" id="workspace-root">

        <!-- 3D Viewport Left -->
        <div class="viewport-container" id="viewport">
            <canvas id="webgl-canvas"></canvas>

            <!-- Floating Toggle Panel Button -->
            <button class="floating-toggle-btn" id="toggle-panel-btn" onclick="togglePanel()" title="우측 패널 접기/펴기">▶ 패널
                숨기기</button>

            <!-- Camera Snap Buttons -->
            <div class="camera-snaps">
                <button class="snap-btn" onclick="snapCamera('front')">🖥️ Front (정면)</button>
                <button class="snap-btn" onclick="snapCamera('right')">👉 Right (우측)</button>
                <button class="snap-btn" onclick="snapCamera('top')">👆 Top (윗면)</button>
                <button class="snap-btn" onclick="snapCamera('back')">🔙 Back (뒷면)</button>
                <button class="snap-btn" onclick="snapCamera('left')">👈 Left (좌측)</button>
                <button class="snap-btn" onclick="snapCamera('bottom')">👇 Bottom (아랫면)</button>
                <button class="snap-btn active" onclick="snapCamera('iso')">🧊 3D 입체뷰</button>
            </div>

            <!-- X-Ray Opacity Bar -->
            <div class="xray-bar">
                <label for="xray-slider">🔍 X-Ray 종이 투명도:</label>
                <input type="range" id="xray-slider" min="20" max="100" value="90" step="5" style="width: 140px;">
                <span id="xray-text" style="font-size: 0.85rem; font-weight:700; color: #60a5fa; width:40px;">90%</span>
            </div>
        </div>

        <!-- Splitter/Resizer Bar -->
        <div class="panel-resizer" id="panel-resizer" title="드래그하여 크기 조절">
            <div class="resizer-handle"></div>
        </div>

        <!-- Right Panel Tabs & Inspector -->
        <div class="right-panel" id="right-panel">
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('tab-inspector')">📑 포개짐(X-Ray) 분석기</button>
                <button class="tab-btn" onclick="switchTab('tab-editor')">✏️ 2D 힌지/주름선 조작</button>
            </div>

            <!-- Tab 1: Layer Overlap Inspector -->
            <div class="tab-content active" id="tab-inspector">
                <div class="inspector-summary">
                    <strong>💡 X-Ray 포개짐 분석 안내:</strong><br>
                    현재 접기 상태에서 공간상 동일한 위치에 포개진 종이 셀들을 그룹별로 정렬하여 보여줍니다. 3D 화면의 셀을 클릭하거나 아래 카드를 클릭하면 위치가 하이라이트됩니다!
                </div>
                <div id="clusters-list">
                    <!-- Dynamic Clusters Injected Here -->
                </div>
            </div>

            <!-- Tab 2: 2D Crease Pattern Editor -->
            <div class="tab-content" id="tab-editor">
                <div class="editor-container">
                    <div class="preset-bar">
                        <button class="preset-btn" onclick="applyPreset('cube')">✨ 사용자 커스텀 육면체 프리셋</button>
                        <button class="preset-btn reset" onclick="applyPreset('flat')">🔄 전체 평면 초기화</button>
                    </div>

                    <div class="crease-legend">
                        <div class="legend-item">
                            <div class="legend-color" style="background: #3b82f6;"></div>Valley (+90°)
                        </div>
                        <div class="legend-item">
                            <div class="legend-color" style="background: #ef4444;"></div>Mountain (-90°)
                        </div>
                        <div class="legend-item">
                            <div class="legend-color" style="background: #64748b;"></div>Flat (0°)
                        </div>
                    </div>

                    <div id="crease-svg-wrapper">
                        <svg id="crease-svg" xmlns="http://www.w3.org/2000/svg"></svg>
                    </div>
                    <div style="font-size:0.8rem; color:var(--text-muted); text-align:center; line-height:1.4;">
                        위 2D 전개도에서 점선을 클릭하면 <strong style="color:#60a5fa;">Valley 90°</strong> → <strong
                            style="color:#ef4444;">Mountain -90°</strong> → <strong style="color:#64748b;">Flat
                            0°</strong> 순서로 실시간 변경됩니다.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JS Application Logic -->
    <script>
        // 1. Data Definitions (60 cells)
        const CELLS_DATA = [
            { row: 0, col: 3, char: "해", num: "1" },
            { row: 0, col: 5, char: "입", num: "" },
            { row: 1, col: 2, char: "조", num: "2" },
            { row: 1, col: 3, char: "임", num: "" },
            { row: 1, col: 4, char: "요", num: "3" },
            { row: 1, col: 5, char: "소", num: "4" },
            { row: 1, col: 7, char: "체", num: "" },
            { row: 2, col: 4, char: "오", num: "5" },
            { row: 2, col: 5, char: "리", num: "6" },
            { row: 2, col: 6, char: "수", num: "7" },
            { row: 2, col: 7, char: "육", num: "8" },

            { row: 3, col: 1, char: "관", num: "9" },
            { row: 3, col: 2, char: "자", num: "10" },
            { row: 3, col: 4, char: "드", num: "11" },
            { row: 3, col: 5, char: "뷔", num: "12" },
            { row: 3, col: 6, char: "시", num: "" },
            { row: 4, col: 1, char: "찰", num: "13" },
            { row: 4, col: 2, char: "옥", num: "" },
            { row: 4, col: 3, char: "수", num: "14" },
            { row: 4, col: 4, char: "수", num: "" },
            { row: 4, col: 5, char: "전", num: "" },
            { row: 4, col: 8, char: "짜", num: "15" },
            { row: 4, col: 9, char: "계", num: "16" },
            { row: 4, col: 10, char: "치", num: "17" },
            { row: 5, col: 0, char: "획", num: "18" },
            { row: 5, col: 1, char: "일", num: "" },
            { row: 5, col: 2, char: "주", num: "19" },
            { row: 5, col: 3, char: "의", num: "" },
            { row: 5, col: 5, char: "역", num: "20" },

            { row: 5, col: 8, char: "상", num: "22" },
            { row: 5, col: 9, char: "류", num: "" },
            { row: 5, col: 10, char: "사", num: "" },
            { row: 5, col: 11, char: "회", num: "23" },
            { row: 6, col: 1, char: "지", num: "24" },
            { row: 6, col: 2, char: "올", num: "" },
            { row: 6, col: 3, char: "팍", num: "25" },
            { row: 6, col: 6, char: "진", num: "26" },
            { row: 6, col: 7, char: "어", num: "27" },
            { row: 6, col: 8, char: "별", num: "" },
            { row: 6, col: 9, char: "만", num: "28" },
            { row: 6, col: 10, char: "찬", num: "" },
            { row: 7, col: 5, char: "가", num: "29" },
            { row: 7, col: 6, char: "솔", num: "" },
            { row: 7, col: 7, char: "린", num: "" },
            { row: 7, col: 9, char: "토", num: "30" },
            { row: 7, col: 10, char: "란", num: "" },
            { row: 7, col: 11, char: "대", num: "" },
            { row: 8, col: 4, char: "삼", num: "31" },
            { row: 8, col: 5, char: "분", num: "" },
            { row: 8, col: 6, char: "의", num: "32" },
            { row: 8, col: 7, char: "이", num: "" },
            { row: 9, col: 4, char: "한", num: "" },
            { row: 9, col: 6, char: "소", num: "33" },
            { row: 9, col: 7, char: "집", num: "" },
            { row: 9, col: 8, char: "해", num: "34" },
            { row: 9, col: 9, char: "제", num: "35" },
            { row: 10, col: 6, char: "거", num: "" },
            { row: 10, col: 8, char: "고", num: "36" }
        ];

        // 2. Global State & Edge Map
        const cellMap = new Map();
        CELLS_DATA.forEach((c, idx) => {
            c.id = idx;
            cellMap.set(`${c.row},${c.col}`, c);
        });

        // Edge structure: key -> state ('flat', 'valley', 'mountain')
        const edgeStates = {};
        const internalEdges = [];
        const adjGraph = new Map(); // cellId -> list of {neighborId, edgeKey, dir}

        CELLS_DATA.forEach(c => adjGraph.set(c.id, []));

        // Discover internal edges between orthogonal neighbors
        CELLS_DATA.forEach(c1 => {
            CELLS_DATA.forEach(c2 => {
                if (c1.id >= c2.id) return;
                const dr = c2.row - c1.row;
                const dc = c2.col - c1.col;
                if (Math.abs(dr) + Math.abs(dc) === 1) {
                    // Normalize key
                    const key = `${Math.min(c1.row, c2.row)},${Math.min(c1.col, c2.col)}-${Math.max(c1.row, c2.row)},${Math.max(c1.col, c2.col)}`;
                    edgeStates[key] = 'flat';
                    internalEdges.push(key);

                    // Direction from c1 to c2
                    let dir = dr === 1 ? 'S' : (dr === -1 ? 'N' : (dc === 1 ? 'E' : 'W'));
                    adjGraph.get(c1.id).push({ neighborId: c2.id, edgeKey: key, dir: dir });

                    let revDir = dir === 'S' ? 'N' : (dir === 'N' ? 'S' : (dir === 'E' ? 'W' : 'E'));
                    adjGraph.get(c2.id).push({ neighborId: c1.id, edgeKey: key, dir: revDir });
                }
            });
        });

        // Spanning Tree & Hierarchy rebuilding function
        const rootCell = cellMap.get('5,5') || CELLS_DATA[0];

        // 3. Three.js Scene Setup
        const canvas = document.getElementById('webgl-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
        camera.position.set(0, -14, 16);
        camera.up.set(0, 1, 0);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setSize(canvas.clientWidth, canvas.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 60;
        controls.minDistance = 3;

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight1.position.set(10, -20, 25);
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0x60a5fa, 0.4);
        dirLight2.position.set(-15, 15, -10);
        scene.add(dirLight2);

        // 4. Create Cell Textures and Mesh Hierarchy
        const S = 1.0; // Size of square cell in 3D units
        const cellMeshes = new Map(); // cellId -> Mesh
        const hingeGroups = new Map(); // cellId -> Object3D container for cell and its children

        // Create canvas texture for each cell
        function createCellTexture(cell) {
            const ctxCanvas = document.createElement('canvas');
            ctxCanvas.width = 256;
            ctxCanvas.height = 256;
            const ctx = ctxCanvas.getContext('2d');

            // Cell Background
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(0, 0, 256, 256);

            // Border
            ctx.strokeStyle = '#60a5fa';
            ctx.lineWidth = 8;
            ctx.strokeRect(4, 4, 248, 248);

            // Inner subtle border
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.lineWidth = 2;
            ctx.strokeRect(12, 12, 232, 232);

            // Number (if any)
            if (cell.num) {
                ctx.fillStyle = '#34d399';
                ctx.font = 'bold 36px Outfit, sans-serif';
                ctx.fillText(cell.num, 20, 48);
            }

            // Korean Character
            ctx.fillStyle = '#ffffff';
            ctx.font = '800 130px Inter, -apple-system, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(cell.char, 128, 136);

            const texture = new THREE.CanvasTexture(ctxCanvas);
            texture.anisotropy = 16;
            return texture;
        }

        // Build 3D Hierarchy
        const rootGroup = new THREE.Group();
        scene.add(rootGroup);

        // First, create all cell objects wrapped in local hinge groups
        CELLS_DATA.forEach(c => {
            const group = new THREE.Group();
            hingeGroups.set(c.id, group);

            const geom = new THREE.PlaneGeometry(S, S);
            const mat = new THREE.MeshStandardMaterial({
                map: createCellTexture(c),
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.9,
                roughness: 0.3,
                metalness: 0.1
            });
            const mesh = new THREE.Mesh(geom, mat);
            mesh.userData = { cell: c };
            group.add(mesh);
            cellMeshes.set(c.id, mesh);
        });

        function rebuild3DHierarchy() {
            // Reset all hingeGroups and rootGroup
            while (rootGroup.children.length > 0) {
                rootGroup.remove(rootGroup.children[0]);
            }
            CELLS_DATA.forEach(c => {
                const group = hingeGroups.get(c.id);
                group.position.set(0, 0, 0);
                group.rotation.set(0, 0, 0);
                // Clear any sub-anchors while keeping only the cell plane mesh
                while (group.children.length > 0) {
                    group.remove(group.children[0]);
                }
                group.add(cellMeshes.get(c.id));
            });

            // Spanning tree via BFS, prioritizing Flat edges so folded edges become tree hinges connecting rigid faces
            const treeEdges = [];
            const visited = new Set([rootCell.id]);
            const queue = [rootCell.id];

            while (queue.length > 0) {
                const currId = queue.shift();
                const neighbors = adjGraph.get(currId).slice();
                neighbors.sort((a, b) => {
                    const stateA = edgeStates[a.edgeKey] || 'flat';
                    const stateB = edgeStates[b.edgeKey] || 'flat';
                    if (stateA === 'flat' && stateB !== 'flat') return -1;
                    if (stateA !== 'flat' && stateB === 'flat') return 1;
                    return 0;
                });

                for (const edge of neighbors) {
                    if (!visited.has(edge.neighborId)) {
                        visited.add(edge.neighborId);
                        treeEdges.push({
                            parent: currId,
                            child: edge.neighborId,
                            edgeKey: edge.edgeKey,
                            dir: edge.dir
                        });
                        queue.push(edge.neighborId);
                    }
                }
            }

            // Reattach root and children
            const rootHinge = hingeGroups.get(rootCell.id);
            rootHinge.position.set(0, 0, 0);
            rootGroup.add(rootHinge);

            treeEdges.forEach(item => {
                const parentGroup = hingeGroups.get(item.parent);
                const childGroup = hingeGroups.get(item.child);

                const anchor = new THREE.Group();
                anchor.userData = { edgeKey: item.edgeKey, dir: item.dir };

                if (item.dir === 'E') {
                    anchor.position.set(S / 2, 0, 0);
                    childGroup.position.set(S / 2, 0, 0);
                } else if (item.dir === 'W') {
                    anchor.position.set(-S / 2, 0, 0);
                    childGroup.position.set(-S / 2, 0, 0);
                } else if (item.dir === 'N') {
                    anchor.position.set(0, S / 2, 0);
                    childGroup.position.set(0, S / 2, 0);
                } else if (item.dir === 'S') {
                    anchor.position.set(0, -S / 2, 0);
                    childGroup.position.set(0, -S / 2, 0);
                }

                parentGroup.add(anchor);
                anchor.add(childGroup);
            });
        }

        rebuild3DHierarchy();

        // 5. Kinematic Hinge Updates
        function updateFoldAngles(percent) {
            const P = percent / 100.0;

            // Traverse parentGroup hierarchy and update hinge rotation
            rootGroup.traverse(obj => {
                if (obj.userData && obj.userData.edgeKey) {
                    const state = edgeStates[obj.userData.edgeKey] || 'flat';
                    let targetRad = 0;
                    if (state === 'valley') targetRad = Math.PI / 2;
                    else if (state === 'mountain') targetRad = -Math.PI / 2;

                    const currentRad = targetRad * P;
                    const dir = obj.userData.dir;

                    // Axis rotation depends on border orientation
                    obj.rotation.set(0, 0, 0);
                    if (dir === 'E') {
                        obj.rotation.y = -currentRad;
                    } else if (dir === 'W') {
                        obj.rotation.y = currentRad;
                    } else if (dir === 'N') {
                        obj.rotation.x = currentRad;
                    } else if (dir === 'S') {
                        obj.rotation.x = -currentRad;
                    }
                }
            });

            rootGroup.updateMatrixWorld(true);
            updateOverlapInspector();
        }

        // 6. Overlap (X-Ray) Inspector Logic
        let highlightedCluster = null;

        function updateOverlapInspector() {
            // Collect world center positions of all 54 cells
            const positions = [];
            const worldPos = new THREE.Vector3();
            const worldNormal = new THREE.Vector3();

            CELLS_DATA.forEach(c => {
                const mesh = cellMeshes.get(c.id);
                mesh.getWorldPosition(worldPos);
                // Normal is along Z axis in local plane
                worldNormal.set(0, 0, 1).applyQuaternion(mesh.getWorldQuaternion(new THREE.Quaternion()));
                positions.push({
                    cell: c,
                    pos: worldPos.clone(),
                    normal: worldNormal.clone(),
                    mesh: mesh
                });
            });

            // Group cells by spatial clustering (within 0.35 3D distance)
            const clusters = [];
            const visitedCells = new Set();

            positions.forEach(item => {
                if (visitedCells.has(item.cell.id)) return;
                visitedCells.add(item.cell.id);

                const cluster = [item];
                positions.forEach(other => {
                    if (!visitedCells.has(other.cell.id) && item.pos.distanceTo(other.pos) < 0.35) {
                        visitedCells.add(other.cell.id);
                        cluster.push(other);
                    }
                });

                clusters.push(cluster);
            });

            // Sort clusters: multi-cell overlapping clusters first, then single cells
            clusters.sort((a, b) => b.length - a.length);

            // Render right panel cards
            const container = document.getElementById('clusters-list');
            container.innerHTML = '';

            clusters.forEach((cluster, idx) => {
                const isMulti = cluster.length > 1;
                const card = document.createElement('div');
                card.className = 'cluster-card' + (isMulti ? ' highlight' : '');

                // Title based on coordinate or face
                const avgX = Math.round(cluster[0].pos.x * 10) / 10;
                const avgY = Math.round(cluster[0].pos.y * 10) / 10;
                const avgZ = Math.round(cluster[0].pos.z * 10) / 10;

                card.innerHTML = `
                    <div class="cluster-header">
                        <span class="cluster-title">
                            ${isMulti ? '🔥 겹쳐진 레이어 그룹' : '📍 단일 셀'} #${idx + 1}
                        </span>
                        <span class="cluster-count">${cluster.length}개 셀 포개짐</span>
                    </div>
                    <div style="font-size:0.75rem; color:#94a3b8; margin-bottom:8px;">
                        3D 공간 위치: (${avgX}, ${avgY}, ${avgZ})
                    </div>
                    <div class="stacked-cells">
                        ${cluster.map((item, layerIdx) => `
                            <div class="stack-item">
                                <span class="stack-level">${layerIdx + 1}층</span>
                                <div class="stack-char">${item.cell.char}</div>
                                <div class="stack-info">
                                    ${item.cell.num ? `<strong>[#${item.cell.num}]</strong> ` : ''}
                                    격자 (${item.cell.row}, ${item.cell.col})
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;

                card.onclick = () => highlightClusterIn3D(cluster, card);
                container.appendChild(card);
            });
        }

        function highlightClusterIn3D(cluster, cardElem) {
            // Remove previous highlights
            cellMeshes.forEach(mesh => {
                mesh.material.emissive.setHex(0x000000);
            });
            document.querySelectorAll('.cluster-card').forEach(c => c.style.border = '');

            // Highlight new cluster in gold
            cluster.forEach(item => {
                item.mesh.material.emissive.setHex(0xfbbf24);
                item.mesh.material.emissiveIntensity = 0.6;
            });
            if (cardElem) cardElem.style.border = '2px solid #fbbf24';
        }

        // Raycasting for 3D Cell Click Inspector
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (e) => {
            // Only trigger inside viewport
            const rect = canvas.getBoundingClientRect();
            if (e.clientX < rect.left || e.clientX > rect.right || e.clientY < rect.top || e.clientY > rect.bottom) return;

            mouse.x = ((e.clientX - rect.left) / canvas.clientWidth) * 2 - 1;
            mouse.y = -((e.clientY - rect.top) / canvas.clientHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(Array.from(cellMeshes.values()));

            if (intersects.length > 0) {
                const hitCell = intersects[0].object.userData.cell;
                switchTab('tab-inspector');
                // Find and click the matching cluster card after brief delay
                setTimeout(() => {
                    const cards = document.querySelectorAll('.cluster-card');
                    cards.forEach(card => {
                        if (card.innerText.includes(`(${hitCell.row}, ${hitCell.col})`)) {
                            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            card.click();
                        }
                    });
                }, 50);
            }
        });

        // 7. 2D Crease Pattern Editor SVG Setup
        function render2DCreaseEditor() {
            const svg = document.getElementById('crease-svg');
            const minR = Math.min(...CELLS_DATA.map(c => c.row));
            const maxR = Math.max(...CELLS_DATA.map(c => c.row));
            const minC = Math.min(...CELLS_DATA.map(c => c.col));
            const maxC = Math.max(...CELLS_DATA.map(c => c.col));

            const pad = 40;
            const cellSize = 50;
            const w = (maxC - minC + 1) * cellSize + pad * 2;
            const h = (maxR - minR + 1) * cellSize + pad * 2;

            svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
            let html = '';

            // Cells background & text
            CELLS_DATA.forEach(c => {
                const x = pad + (c.col - minC) * cellSize;
                const y = pad + (c.row - minR) * cellSize;
                html += `
                    <rect x="${x}" y="${y}" width="${cellSize}" height="${cellSize}" fill="#1e293b" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
                    <text x="${x + cellSize / 2}" y="${y + cellSize / 2 + 5}" fill="#f8fafc" font-size="20" font-weight="700" text-anchor="middle">${c.char}</text>
                    ${c.num ? `<text x="${x + 6}" y="${y + 14}" fill="#34d399" font-size="10" font-weight="700">${c.num}</text>` : ''}
                `;
            });

            // Internal edges interactive triggers
            internalEdges.forEach(key => {
                const parts = key.split('-');
                const p1 = parts[0].split(',').map(Number);
                const p2 = parts[1].split(',').map(Number);

                let x1, y1, x2, y2;
                if (p1[0] === p2[0]) {
                    // Horizontal neighbors along same row (p2[1] === p1[1] + 1)
                    // The vertical shared boundary is at col p2[1]
                    x1 = pad + (p2[1] - minC) * cellSize;
                    y1 = pad + (p1[0] - minR) * cellSize;
                    x2 = x1;
                    y2 = pad + (p1[0] + 1 - minR) * cellSize;
                } else {
                    // Vertical neighbors along same col (p2[0] === p1[0] + 1)
                    // The horizontal shared boundary is at row p2[0]
                    x1 = pad + (p1[1] - minC) * cellSize;
                    y1 = pad + (p2[0] - minR) * cellSize;
                    x2 = pad + (p1[1] + 1 - minC) * cellSize;
                    y2 = y1;
                }

                const state = edgeStates[key] || 'flat';
                let color = '#64748b';
                let dash = 'stroke-dasharray="4,4"';
                let width = 2;

                if (state === 'valley') { color = '#3b82f6'; dash = ''; width = 4; }
                else if (state === 'mountain') { color = '#ef4444'; dash = ''; width = 4; }

                html += `
                    <line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="${width}" ${dash} />
                    <line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="transparent" stroke-width="16" style="cursor:pointer;" onclick="toggleEdgeState('${key}')" />
                `;
            });

            svg.innerHTML = html;
        }

        window.toggleEdgeState = function (key) {
            const current = edgeStates[key] || 'flat';
            if (current === 'flat') edgeStates[key] = 'valley';
            else if (current === 'valley') edgeStates[key] = 'mountain';
            else edgeStates[key] = 'flat';

            rebuild3DHierarchy();
            render2DCreaseEditor();
            const percent = parseFloat(document.getElementById('fold-slider').value);
            updateFoldAngles(percent);
        };

        // 8. Presets Setup (User Custom Fold Preset)
        window.applyPreset = function (type) {
            if (type === 'flat') {
                internalEdges.forEach(k => edgeStates[k] = 'flat');
            } else if (type === 'cube') {
                // First reset all to flat
                internalEdges.forEach(k => edgeStates[k] = 'flat');

                // User's exact custom fold criteria (29 lines: 23 existing + 6 new)
                const customFolds = {
                    "0,3-1,3": "valley",
                    "0,5-1,5": "valley",
                    "1,2-1,3": "valley",
                    // "1,7-2,7": "valley",
                    "2,5-2,6": "valley",
                    // "3,0-3,1": "valley",
                    "3,1-4,1": "valley",
                    "3,2-4,2": "valley",
                    "3,4-4,4": "valley",
                    "3,5-3,6": "valley",
                    "3,5-4,5": "valley",
                    "4,2-4,3": "valley",
                    "4,8-4,9": "valley",
                    "5,2-5,3": "valley",
                    "5,5-5,6": "valley",
                    "5,8-5,9": "valley",
                    "6,2-6,3": "valley",
                    "6,6-7,6": "valley",
                    "6,7-7,7": "valley",
                    "6,8-6,9": "valley",
                    "6,9-7,9": "valley",
                    "6,10-7,10": "valley",
                    "7,5-7,6": "valley",
                    // "7,10-7,11": "valley",
                    // "8,4-9,4": "valley",
                    "8,5-8,6": "valley",
                    "9,6-10,6": "valley",
                    "9,8-9,9": "valley",
                    "9,8-10,8": "valley"
                };

                Object.keys(customFolds).forEach(k => {
                    if (edgeStates.hasOwnProperty(k) || internalEdges.includes(k)) {
                        edgeStates[k] = customFolds[k];
                    }
                });
            }

            rebuild3DHierarchy();
            render2DCreaseEditor();
            const percent = parseFloat(document.getElementById('fold-slider').value);
            updateFoldAngles(percent);
        };

        function int(s) { return parseInt(s, 10); }

        // 9. Camera Snap Controls
        window.snapCamera = function (view) {
            document.querySelectorAll('.snap-btn').forEach(btn => btn.classList.remove('active'));
            if (event && event.target) event.target.classList.add('active');

            const dist = 14;
            let targetPos = new THREE.Vector3(0, 0, dist);
            if (view === 'front') targetPos.set(0, -dist, 0);
            else if (view === 'back') targetPos.set(0, dist, 0);
            else if (view === 'top') targetPos.set(0, 0, dist);
            else if (view === 'bottom') targetPos.set(0, 0, -dist);
            else if (view === 'right') targetPos.set(dist, 0, 0);
            else if (view === 'left') targetPos.set(-dist, 0, 0);
            else if (view === 'iso') targetPos.set(0, -14, 16);

            // Smooth animation via requestAnimationFrame
            const startPos = camera.position.clone();
            const startTime = performance.now();
            const duration = 500;

            function animateCam(time) {
                const elapsed = time - startTime;
                const t = Math.min(1, elapsed / duration);
                const ease = 1 - Math.pow(1 - t, 3); // Cubic ease out

                camera.position.lerpVectors(startPos, targetPos, ease);
                camera.lookAt(0, 0, 0);
                controls.update();

                if (t < 1) requestAnimationFrame(animateCam);
            }
            requestAnimationFrame(animateCam);
        };

        // 10. UI & Tab Switching
        window.switchTab = function (tabId) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            if (event && event.target) event.target.classList.add('active');
            else {
                if (tabId === 'tab-inspector') document.querySelectorAll('.tab-btn')[0].classList.add('active');
                if (tabId === 'tab-editor') document.querySelectorAll('.tab-btn')[1].classList.add('active');
            }
            document.getElementById(tabId).classList.add('active');
        };

        // Sliders Listeners
        const foldSlider = document.getElementById('fold-slider');
        const percentText = document.getElementById('percent-text');

        foldSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            percentText.innerText = `${val}%`;
            updateFoldAngles(val);
        });

        const xraySlider = document.getElementById('xray-slider');
        const xrayText = document.getElementById('xray-text');

        xraySlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            xrayText.innerText = `${val}%`;
            const opacity = val / 100.0;
            cellMeshes.forEach(mesh => {
                mesh.material.opacity = opacity;
                mesh.material.transparent = opacity < 0.99;
            });
        });

        // 11. Panel Resizer & Collapse Toggle Logic
        const resizer = document.getElementById('panel-resizer');
        const rightPanel = document.getElementById('right-panel');
        const viewportContainer = document.getElementById('viewport');
        let isResizing = false;

        if (resizer && rightPanel) {
            resizer.addEventListener('mousedown', (e) => {
                isResizing = true;
                resizer.classList.add('resizing');
                document.body.style.cursor = window.innerWidth <= 960 ? 'row-resize' : 'col-resize';
                e.preventDefault();
            });

            window.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                if (window.innerWidth > 960) {
                    // Horizontal resize
                    const newWidth = window.innerWidth - e.clientX;
                    if (newWidth >= 280 && newWidth <= window.innerWidth * 0.75) {
                        rightPanel.style.width = newWidth + 'px';
                        window.dispatchEvent(new Event('resize'));
                    }
                } else {
                    // Vertical resize in column mode (iPad portrait)
                    const newHeight = window.innerHeight - e.clientY;
                    if (newHeight >= 150 && newHeight <= window.innerHeight * 0.8) {
                        rightPanel.style.height = newHeight + 'px';
                        viewportContainer.style.height = (window.innerHeight - newHeight - 72) + 'px';
                        window.dispatchEvent(new Event('resize'));
                    }
                }
            });

            window.addEventListener('mouseup', () => {
                if (isResizing) {
                    isResizing = false;
                    resizer.classList.remove('resizing');
                    document.body.style.cursor = 'default';
                    window.dispatchEvent(new Event('resize'));
                }
            });
        }

        let isPanelCollapsed = false;
        window.togglePanel = function () {
            const btn = document.getElementById('toggle-panel-btn');
            if (!isPanelCollapsed) {
                rightPanel.classList.add('collapsed');
                if (resizer) resizer.style.display = 'none';
                if (btn) btn.innerHTML = '◀ 패널 열기 (2D 편집기 / X-Ray)';
                isPanelCollapsed = true;
            } else {
                rightPanel.classList.remove('collapsed');
                if (resizer) resizer.style.display = 'flex';
                if (btn) btn.innerHTML = '▶ 패널 숨기기';
                isPanelCollapsed = false;
            }
            setTimeout(() => window.dispatchEvent(new Event('resize')), 260);
        };

        // 13. Initial Setup & Animation Loop
        window.addEventListener('resize', () => {
            const w = canvas.clientWidth;
            const h = canvas.clientHeight;
            if (w && h && camera && renderer) {
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            }
        });

        // Initialize with default cube preset fold
        applyPreset('cube');
        updateFoldAngles(100);

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            if (renderer && scene && camera) renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
