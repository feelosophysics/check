# AI Git 생성기 팀 컨벤션 설정 파일

commit:
  # 커밋 메시지 제목에 사용할 접두어(Prefix) 목록
  prefix_rules:
    - "feat: 새로운 기능 추가"
    - "fix: 버그 수정"
    - "docs: 문서 수정 (README.md, 가이드문서 등)"
    - "style: 코드 스타일 수정 (포맷팅, 세미콜론 누락 등)"
    - "refactor: 코드 리팩토링"
    - "test: 테스트 코드 추가 및 리팩토링"
    - "chore: 빌드 업무, 패키지 매니저 설정 등"
  
  # 커밋 메시지 생성 시 추가 요구사항
  format_requirements:
    - "제목은 영문 또는 한글로 명확히 작성하되 50자 이내로 제한해 주세요."
    - "본문 요약 항목은 변경 범위와 의도가 잘 보이도록 명시해 주세요."

pr:
  # PR 초안 생성 시 추가 요구사항
  additional_requirements:
    - "핵심 변경 사항 섹션에서 각 파일별 역할 변화를 명시해 주세요."
    - "가급적 존댓말(해요체)로 친절하게 작성해 주세요."
